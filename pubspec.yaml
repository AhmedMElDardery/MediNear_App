name: medinear_app
description: "A new Flutter project for Medinear Pharmacy App."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # --- [ Core & Architecture ] ---
  get_it: ^9.2.0
  provider: ^6.1.5+1

  # --- [ Networking & API ] ---
  dio: ^5.9.1
  #http: ^1.2.1  # 🚀 ضفتلك مكتبة الـ http هنا

  # --- [ Authentication & Firebase ] ---
  firebase_core: ^2.24.2
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^7.1.5

  # --- [ Local Storage & Caching ] ---
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^9.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # --- [ Maps & Location ] ---
  # 🚀 رجعنا جوجل مابس الرسمية عشان الديزاين البريميوم بتاعك
  google_maps_flutter: ^2.10.0
  geolocator: ^14.0.2

  # --- [ UI & Design Utilities ] ---
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^11.0.0
  smooth_page_indicator: ^2.0.1
  shimmer: ^3.0.0

  # --- [ General Utilities ] ---
  intl: ^0.20.2
  image_picker: ^1.2.1
  url_launcher: ^6.3.2
  onesignal_flutter: ^5.4.1
  speech_to_text: ^7.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  change_app_package_name: ^1.5.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - lib/core/localization/en.json
    - lib/core/localization/ar.json